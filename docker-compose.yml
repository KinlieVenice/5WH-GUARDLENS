services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotelsec
    # host ports 3306/6379 are occupied by other projects on this machine;
    # remapped to 3307/6380 so we never touch them. Container ports unchanged.
    ports: ["3307:3306"]
    # --default-authentication-plugin removed in MySQL 8.4; caching_sha2_password is now the default
    volumes:
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
  redis:
    image: redis:7
    ports: ["6380:6379"]
